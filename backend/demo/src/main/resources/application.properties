spring.application.name=demo


spring.datasource.url=jdbc:postgresql://localhost:5432/playforward
spring.datasource.username=postgres
spring.datasource.password=devpass


spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.flyway.enabled=false


# === Google OAuth2 Configuration ===
spring.security.oauth2.client.registration.google.client-id=318894516778-qf0g0br2ov2hdcsv8c35mjfccn0bqs1t.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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

# "scope" tells Google what information you want to request.
# "openid", "profile", and "email" are the most common.
spring.security.oauth2.client.registration.google.scope=openid, profile, email

# URL used when redirecting back to the SPA after OAuth flow completes
app.frontend.url=http://localhost:5173

# === JWT Configuration ===
# Secret key for signing JWT tokens (min 256 bits / 32 characters for HS256)
# For production, use a strong random key and store it securely (env variable)
app.jwt.secret=PlayForward2025SecureJWTSecretKeyForDevelopmentMinimum256Bits
# JWT token expiration in milliseconds (86400000 ms = 24 hours)
app.jwt.expiration-ms=86400000
