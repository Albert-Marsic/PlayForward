spring.application.name=demo


spring.datasource.url=jdbc:postgresql://localhost:5432/playforward
spring.datasource.username=postgres
spring.datasource.password=devpass


spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


# === Google OAuth2 Configuration ===
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:318894516778-qf0g0br2ov2hdcsv8c35mjfccn0bqs1t.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}

# "scope" tells Google what information you want to request.
# "openid", "profile", and "email" are the most common.
spring.security.oauth2.client.registration.google.scope=openid, profile, email

# Comma-separated frontend origins used for CORS and OAuth redirects
# Include both deployed and local dev origins so the app works locally and on Render
app.frontend.urls=https://playforward-ee8c.onrender.com,http://localhost:5173

# === JWT Configuration ===
# Secret key for signing JWT tokens (min 256 bits / 32 characters for HS256)
# For production, use a strong random key and store it securely (env variable)
app.jwt.secret=PlayForward2025SecureJWTSecretKeyForDevelopmentMinimum256Bits
# JWT token expiration in milliseconds (86400000 ms = 24 hours)
app.jwt.expiration-ms=86400000
