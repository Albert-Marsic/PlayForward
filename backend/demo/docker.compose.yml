version: '3.8'

services:
  # Service 1: Your Spring Boot Application
  spring-app:
    # Tells Docker to build the image using the 'Dockerfile' in this directory
    build: .
    restart: on-failure
    # Maps port 8080 on your computer to port 8080 in the container
    ports:
      - "8080:8080"
    # This is the magic! We override the application.properties
    # by setting environment variables.
    environment:
      # The URL points to the 'postgres-db' service name, NOT 'localhost'
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/mydatabase
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=mypassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    # Makes sure 'postgres-db' starts *before* 'spring-app'
    depends_on:
      - postgres-db

  # Service 2: The PostgreSQL Database
  postgres-db:
    image: postgres:15
    restart: always
    # These variables create the database and user
    environment:
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
    # Maps port 5432 on your computer to port 5432 in the container
    # This lets you connect to the DB from your computer (e.g., with DBeaver)
    ports:
      - "5432:5432"
    # This creates a 'volume' to persist your database data
    # even if you stop and remove the container
    volumes:
      - postgres-data:/var/lib/postgresql/data

# Defines the named volume used above
volumes:
  postgres-data: