Great! Using Docker is the perfect way to solve this. It ensures you have a stable PostgreSQL database running every time you develop.

We'll use Docker Compose to start both your Spring Boot app and a PostgreSQL database in two separate containers that can talk to each other.

Here's the step-by-step plan:

1. Build Your Spring Boot App
First, you need to package your Spring Boot application into a .jar file. Run this command in your Spring Boot project's root directory (where your pom.xml is):

Bash

# If you have Maven installed globally
mvn clean package

# Or, if you're using the Maven wrapper
./mvnw clean package
This will create a .jar file inside a new target directory. For example: target/demo-0.0.1-SNAPSHOT.jar.

2. Create a Dockerfile for Spring Boot
In the same root directory as your pom.xml, create a new file named Dockerfile (with no extension) and paste this in:

Dockerfile

# Use a base image with Java 17 (or your version)
FROM eclipse-temurin:17-jdk-jammy

# Set a working directory inside the container
WORKDIR /app

# Copy the built JAR file into the container
# !!! IMPORTANT: Change 'demo-0.0.1-SNAPSHOT.jar'
# !!! to match the exact name of your JAR file in the 'target' folder
COPY target/demo-0.0.1-SNAPSHOT.jar app.jar

# Expose the port Spring Boot runs on (default 8080)
EXPOSE 8080

# The command to run the application
ENTRYPOINT ["java", "-jar", "app.jar"]
3. Create a docker-compose.yml File
This is the most important file. In the same root directory, create a file named docker-compose.yml. This file will define and connect your two services: spring-app and postgres-db.

YAML

version: '3.8'

services:
  # Service 1: Your Spring Boot Application
  spring-app:
    # Tells Docker to build the image using the 'Dockerfile' in this directory
    build: .
    restart: on-failure
    # Maps port 8080 on your computer to port 8080 in the container
    ports:
      - "8080:8080"
    # This is the magic! We override the application.properties
    # by setting environment variables.
    environment:
      # The URL points to the 'postgres-db' service name, NOT 'localhost'
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/mydatabase
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=mypassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    # Makes sure 'postgres-db' starts *before* 'spring-app'
    depends_on:
      - postgres-db

  # Service 2: The PostgreSQL Database
  postgres-db:
    image: postgres:15
    restart: always
    # These variables create the database and user
    environment:
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
    # Maps port 5432 on your computer to port 5432 in the container
    # This lets you connect to the DB from your computer (e.g., with DBeaver)
    ports:
      - "5432:5432"
    # This creates a 'volume' to persist your database data
    # even if you stop and remove the container
    volumes:
      - postgres-data:/var/lib/postgresql/data

# Defines the named volume used above
volumes:
  postgres-data: